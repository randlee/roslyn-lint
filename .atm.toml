[atm]
identity = "team-lead"
default_team = "roslyn-lint"

[[atm.post_send_hooks]]
recipient = "crl"
command = ["/Users/randlee/.atm/scripts/atm-nudge-xml-1.py", "crl"]

[rmux]
session = "roslyn-lint"

[[rmux.windows]]
name = "agents"
layout = "even-horizontal"

[[rmux.windows.panes]]
name = "team-lead"
model = "sonnet"
env = { ATM_IDENTITY = "team-lead", ATM_TEAM = "roslyn-lint", CLAUDE_CODE_TASK_LIST_ID = "roslyn-lint" }

[[rmux.windows.panes]]
name = "crl"
command = "codex -c features.codex_hooks=true --yolo"
env = { ATM_IDENTITY = "crl", ATM_TEAM = "roslyn-lint", CLAUDE_CODE_TASK_LIST_ID = "roslyn-lint" }

[[rmux.windows.panes]]
name = "quality-mgr"
model = "sonnet"
env = { ATM_IDENTITY = "quality-mgr", ATM_TEAM = "roslyn-lint", CLAUDE_CODE_TASK_LIST_ID = "roslyn-lint" }

# ── Startup context injection (session_start_context.py hook) ─────────

[startup.team-lead]
all = """
You are team-lead for the roslyn-lint project on team roslyn-lint.
Your Codex agent is crl. Use ATM CLI to communicate with crl: atm send crl "message"

Read .claude/skills/codex-orchestration/SKILL.md 
All task assignments (dev, fix, qa, review) MUST use j2 templates + sc-compose:
- Dev: render .claude/skills/codex-orchestration/dev-template.xml.j2 → SendMessage
- Fix: render .claude/skills/codex-orchestration/fix-assignment.xml.j2 → SendMessage
- QA: render .claude/skills/codex-orchestration/qa-template.xml.j2 → SendMessage
- Review: render .claude/skills/codex-orchestration/review-template.xml.j2 → SendMessage
Do not compose task messages freeform; always render templates first.
"""

[startup.quality-mgr]
all = """
Read .claude/agents/quality-mgr.md for directive
"""
