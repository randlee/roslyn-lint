[atm]
identity = "team-lead"
default_team = "roslyn-lint"

[[atm.post_send_hooks]]
recipient = "crl"
command = ["/Users/randlee/.atm/scripts/atm-nudge-xml-1.py", "crl"]

[rmux]
session = "roslyn-lint"

[[rmux.windows]]
name = "agents"
layout = "even-horizontal"

[[rmux.windows.panes]]
name = "team-lead"
model = "sonnet"
env = { ATM_IDENTITY = "team-lead", ATM_TEAM = "roslyn-lint", CLAUDE_CODE_TASK_LIST_ID = "roslyn-lint" }

[[rmux.windows.panes]]
name = "crl"
command = "codex -c features.codex_hooks=true --yolo"
env = { ATM_IDENTITY = "crl", ATM_TEAM = "roslyn-lint", CLAUDE_CODE_TASK_LIST_ID = "roslyn-lint" }

[[rmux.windows.panes]]
name = "quality-mgr"
model = "sonnet"
env = { ATM_IDENTITY = "quality-mgr", ATM_TEAM = "roslyn-lint", CLAUDE_CODE_TASK_LIST_ID = "roslyn-lint" }

# ── Startup context injection (session_start_context.py hook) ─────────

[startup.team-lead]
all = "You are team-lead for roslyn-lint. Use codex-orchestration j2 templates for all task assignments."

[startup.quality-mgr]
all = "You are quality-mgr for roslyn-lint. See .claude/agents/quality-mgr.md for directive."
