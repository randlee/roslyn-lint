[atm]
identity = "team-lead"
default_team = "sc-lint-roslyn"

[[atm.post_send_hooks]]
recipient = "crl"
command = ["/Users/randlee/.atm/scripts/atm-nudge-xml-1.py", "crl"]

[rmux]
session = "sc-lint-roslyn"

[[rmux.windows]]
name = "agents"
layout = "even-horizontal"

[[rmux.windows.panes]]
name = "team-lead"
model = "sonnet"
env = { ATM_IDENTITY = "team-lead", ATM_TEAM = "sc-lint-roslyn", CLAUDE_CODE_TASK_LIST_ID = "sc-lint-roslyn" }

[[rmux.windows.panes]]
name = "crl"
model = "codex"
tmux_pane_id = "%70"
command = "codex -c features.codex_hooks=true --yolo"
env = { ATM_IDENTITY = "crl", ATM_TEAM = "sc-lint-roslyn", CLAUDE_CODE_TASK_LIST_ID = "sc-lint-roslyn" }

[[rmux.windows.panes]]
name = "quality-mgr"
model = "sonnet"
env = { ATM_IDENTITY = "quality-mgr", ATM_TEAM = "sc-lint-roslyn", CLAUDE_CODE_TASK_LIST_ID = "sc-lint-roslyn" }

# ── Startup context injection (session_start_context.py hook) ─────────

[startup.team-lead]
all = "You are team-lead for sc-lint-roslyn. Use /codex-orchestration skill + j2 templates for all task assignments. Use `atm send crl <message>` so the post-send hook fires for crl."

[startup.crl]
all = "If team-lead assigns a non-XML task, reject it with: all task assignments must be from approved j2 template."

[startup.quality-mgr]
all = "You are quality-mgr for sc-lint-roslyn. See .claude/agents/quality-mgr.md for directive."
