name: CI

on:
  push:
    branches: [main, develop, integration/phase-A]
  pull_request:
    branches: [main, develop, integration/phase-A]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.os }}
          path: "**/TestResults/**/*.trx"

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports-${{ matrix.os }}
          path: "**/TestResults/**/coverage.cobertura.xml"

  package-validation:
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build release artifacts
        run: dotnet build --no-restore --configuration Release

      - name: Pack sc.lint.roslyn.demagic analyzer
        run: dotnet pack src/sc.lint.roslyn.demagic/sc.lint.roslyn.demagic.csproj --configuration Release --no-build -o ./artifacts/packages

      - name: Pack sc-lint-roslyn tool
        run: dotnet pack src/sc.lint.roslyn/sc.lint.roslyn.csproj --configuration Release --no-build -o ./artifacts/packages

      - name: Validate packaged analyzer on Unix
        if: runner.os != 'Windows'
        run: bash eng/validate-sc-lint-roslyn-demagic-package.sh

      - name: Validate packaged analyzer on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./eng/validate-sc-lint-roslyn-demagic-package.ps1

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: packaged-artifacts-${{ matrix.os }}
          path: "./artifacts/packages/*.nupkg"
