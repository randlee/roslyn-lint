name: Publish NuGet

on:
  push:
    tags:
      - 'v*'  # Triggers on tags like v1.0.0, v0.5.1, etc.

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Run tests
        run: dotnet test -c Release --no-build

      - name: Pack Roslyn.DeMagic analyzer
        run: dotnet pack src/Roslyn.DeMagic/Roslyn.DeMagic.csproj -c Release --no-build -p:Version=${{ steps.version.outputs.VERSION }} -o ./packages

      - name: Pack roslyn-lint CLI tool
        run: dotnet pack src/Roslyn.Lint/Roslyn.Lint.csproj -c Release --no-build -p:Version=${{ steps.version.outputs.VERSION }} -o ./packages

      - name: Publish to GitHub Packages
        run: dotnet nuget push ./packages/*.nupkg --source "https://nuget.pkg.github.com/randlee/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

      - name: Publish to NuGet.org
        run: dotnet nuget push ./packages/*.nupkg --source "https://api.nuget.org/v3/index.json" --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate
