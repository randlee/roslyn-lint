name: Publish Phase A Packages

on:
  push:
    tags:
      - 'v*'  # Triggers on tags like v1.0.0, v0.5.1, etc.

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Run tests
        run: dotnet test -c Release --no-build

      - name: Pack Roslyn.DeMagic analyzer
        run: dotnet pack src/Roslyn.DeMagic/Roslyn.DeMagic.csproj -c Release --no-build -p:Version=${{ steps.version.outputs.VERSION }} -o ./artifacts/packages

      - name: Pack roslyn-lint tool
        run: dotnet pack src/Roslyn.Lint/Roslyn.Lint.csproj -c Release --no-build -p:Version=${{ steps.version.outputs.VERSION }} -o ./artifacts/packages

      - name: Validate packaged analyzer-consumer path
        run: bash eng/validate-roslyn-demagic-package.sh

      - name: Publish repo-produced packages to GitHub Packages
        shell: bash
        run: |
          shopt -s nullglob
          packages=(./artifacts/packages/*.nupkg)
          if [ "${#packages[@]}" -eq 0 ]; then
            echo "No packages found to publish."
            exit 1
          fi

          for package in "${packages[@]}"; do
            dotnet nuget push "$package" \
              --source "https://nuget.pkg.github.com/randlee/index.json" \
              --api-key "${{ secrets.GITHUB_TOKEN }}" \
              --skip-duplicate
          done

      - name: NuGet.org publication remains manual for the first Phase A release
        run: echo "Manual NuGet.org release remains required; follow docs/releasing.md."
